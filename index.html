<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎉 Math Magic for Kids 🎉</h1>

    <!-- Forward Counting -->
    <div class="box">
        <h3>Forward Counting</h3>
        <input type="number" id="forwardNum" placeholder="Enter number">
        <br>
        <button onclick="forwardCounting()">Show</button>
        <p id="forwardResult"></p>
    </div>

    <!-- Backward Counting -->
    <div class="box">
        <h3>Backward Counting</h3>
        <input type="number" id="backwardNum" placeholder="Enter number">
        <br>
        <button onclick="backwardCounting()">Show</button>
        <p id="backwardResult"></p>
    </div>

    <!-- Multiplication Table -->
    <div class="box">
        <h3>Multiplication Table</h3>
        <input type="number" id="tableNum" placeholder="Enter number">
        <br>
        <button onclick="showTable()">Show Table</button>
        <p id="tableResult"></p>
    </div> 
   <script src="app.js"></script> 
</body>
</html>
